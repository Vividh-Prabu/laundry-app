<!DOCTYPE html>
<html>
<head>
  <title>Login</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #74ebd5, #9face6);

      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* 📦 CARD */
    .login-card {
      width: 320px;
      padding: 30px;
      border-radius: 16px;

      background: rgba(255, 255, 255, 0.18);
      backdrop-filter: blur(14px);

      box-shadow: 0 12px 40px rgba(0,0,0,0.35);

      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;

      animation: fadeIn 0.6s ease;
    }

    h1 {
      color: #fff;
      margin-bottom: 22px;
      letter-spacing: 1px;
    }

    .input-group {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* 🔥 COMMON FIELD STYLE */
    .field {
      width: 85%;
      margin: 10px 0;
      position: relative;
    }

    .field input {
      width: 100%;
      padding: 12px;
      padding-right: 40px;

      border-radius: 10px;
      border: none;
      outline: none;

      font-size: 14px;
      background: rgba(255,255,255,0.9);

      box-sizing: border-box;
    }

    /* 👁 ICON */
    .eye-icon {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      font-size: 16px;
      opacity: 0.7;
    }

    .eye-icon:hover {
      opacity: 1;
    }

    /* INPUT FOCUS */
    .field input:focus {
      box-shadow: 0 0 8px rgba(79,172,254,0.6);
      transform: scale(1.02);
    }

    /* BUTTONS */
    button {
      width: 85%;
      padding: 12px;
      margin-top: 12px;

      border: none;
      border-radius: 10px;

      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.05);
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    .login-btn {
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      color: white;
    }

    .back-btn {
      background: linear-gradient(135deg, #ff7e5f, #ff3d3d);
      color: white;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px) scale(0.95);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }
  </style>
</head>

<body>

<div class="login-card">

  <h1 id="roleTitle">Login</h1>

  <div class="input-group">

    <!-- 🔥 USERNAME -->
    <div class="field">
      <input id="user" placeholder="Username">
    </div>

    <!-- 🔥 PASSWORD -->
    <div class="field">
      <input id="pass" type="password" placeholder="Password">
      <span class="eye-icon" onclick="togglePassword()">👁</span>
    </div>

  </div>

  <button class="login-btn" onclick="login()">Login</button>
  <button class="back-btn" onclick="back()">⬅ Back</button>

</div>

<script type="module" src="script.js"></script>

<script>
  let role = localStorage.getItem("role") || "User";
  document.getElementById("roleTitle").innerText =
    role.toUpperCase() + " LOGIN";

  function togglePassword() {
    let pass = document.getElementById("pass");
    pass.type = pass.type === "password" ? "text" : "password";
  }
</script>

</body>
</html>
